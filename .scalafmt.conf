# https://scalameta.org/scalafmt/docs/configuration.html
version = "3.8.6"
runner.dialect = scala213

maxColumn = 100
indent.main = 2
indent.callSite = 2
indent.defnSite = 2
indent.extendSite = 2

assumeStandardLibraryStripMargin = true

newlines.source = keep

fileOverride {
  "glob:**/*.sbt" {
    runner.dialect = sbt1
  }
}
